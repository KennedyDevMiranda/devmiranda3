<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Central de Pedidos</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .hero { text-align: center; padding: 80px 16px 40px; }
        .hero h1 { font-size: 2.5rem; margin-bottom: 12px; }
        .hero p { color: var(--text-muted); font-size: 1.1rem; margin-bottom: 32px; }
        .stores-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px; padding: 20px 0;
        }
        .store-card {
            background: var(--dark-card); border-radius: var(--radius);
            padding: 24px; border: 1px solid var(--border);
            cursor: pointer; transition: transform .2s, border-color .2s;
        }
        .store-card:hover { transform: translateY(-4px); border-color: var(--primary); }
        .store-card h3 { margin-bottom: 8px; }
        .store-card .type { color: var(--text-muted); font-size: 13px; margin-bottom: 12px; }
        .store-card .info { font-size: 13px; color: var(--text-muted); }
        .nav-links { display: flex; gap: 16px; justify-content: center; margin-top: 20px; }
        .nav-links a { color: var(--primary); text-decoration: none; font-weight: 600; }
        .nav-links a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="container">
        <div class="hero">
            <h1>🏪 Central de Pedidos</h1>
            <p>Sistema multiempresa de gestão e pedidos</p>
            <div class="nav-links">
                <a href="/admin/">⚙️ Painel Administrativo</a>
                <a href="/pedidos/">📱 Fazer Pedido</a>
            </div>
        </div>
        <div id="stores" class="stores-grid"></div>
    </div>

    <script src="/js/api.js"></script>
    <script>
        async function loadStores() {
            const res = await apiGet('/api/estabelecimentos');
            const container = document.getElementById('stores');
            if (!res.sucesso || !res.dados || res.dados.length === 0) {
                container.innerHTML = `
                    <div class="card text-center" style="grid-column: 1/-1; padding: 40px;">
                        <h3>Nenhum estabelecimento cadastrado</h3>
                        <p style="color: var(--text-muted); margin: 12px 0;">
                            Acesse o <a href="/admin/" style="color:var(--primary)">Painel Administrativo</a> para cadastrar.
                        </p>
                    </div>`;
                return;
            }
            container.innerHTML = res.dados.map(s => `
                <div class="store-card" onclick="openStore(${s.id})">
                    <h3>${s.nome}</h3>
                    <div class="type">${s.tipoDescricao} • ${s.cidade}/${s.estado}</div>
                    <div class="info">
                        ${s.aceitaDelivery ? '🛵 Delivery' : ''} 
                        ${s.aceitaRetirada ? '🏃 Retirada' : ''} 
                        ${s.aceitaBalcao ? '🏪 Balcão' : ''}
                        ${s.aceitaMesa ? '🍽️ Mesa' : ''}
                    </div>
                    <span class="badge badge-${s.statusDescricao === 'Aberto' ? 'success' : 'danger'}" style="margin-top:12px">
                        ${s.statusDescricao}
                    </span>
                </div>
            `).join('');
        }

        function openStore(id) {
            setEstabelecimentoId(id);
            window.location.href = '/pedidos/';
        }

        loadStores();
    </script>
</body>
</html>
