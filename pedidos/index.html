<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cardápio Digital</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .store-banner {
            padding: 16px; text-align: center;
            border-bottom: 1px solid var(--border);
        }
        .store-banner h2 { font-size: 1.3rem; }
        .status-bar {
            padding: 10px 16px; text-align: center;
            font-weight: 600; font-size: 14px;
        }
        .status-bar.open { background: rgba(76,175,80,.15); color: var(--success); }
        .status-bar.closed { background: rgba(244,67,54,.15); color: var(--danger); }
        .status-bar.paused { background: rgba(255,152,0,.15); color: var(--warning); }
        .status-bar .next-opening { font-weight: 400; font-size: 12px; display: block; margin-top: 4px; }
        .status-bar .schedule-toggle {
            background: none; border: none; color: inherit; font-size: 12px;
            cursor: pointer; text-decoration: underline; margin-top: 4px;
        }
        .schedule-list { padding: 8px 16px; font-size: 13px; background: var(--dark-surface); }
        .schedule-list div { display: flex; justify-content: space-between; padding: 4px 0; }

        .categories {
            display: flex; gap: 8px; padding: 12px 16px;
            overflow-x: auto; background: var(--dark-surface);
            -webkit-overflow-scrolling: touch;
        }
        .cat-btn {
            flex-shrink: 0; padding: 8px 16px; border-radius: 20px;
            border: 1px solid var(--border); background: transparent;
            color: var(--text); font-size: 13px; cursor: pointer;
            white-space: nowrap; transition: all .2s;
        }
        .cat-btn.active { background: var(--primary); border-color: var(--primary); color: #fff; }

        .products-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 12px; padding: 16px;
        }
        .product-card {
            background: var(--dark-card); border-radius: var(--radius);
            overflow: hidden; border: 1px solid var(--border);
            transition: transform .2s;
        }
        .product-card:hover { transform: scale(1.02); }
        .product-img {
            height: 100px; background: var(--dark-surface);
            display: flex; align-items: center; justify-content: center;
            font-size: 2.5rem; position: relative;
        }
        .product-badge {
            position: absolute; top: 6px; right: 6px;
            padding: 2px 8px; border-radius: 4px;
            font-size: 10px; font-weight: 700;
        }
        .product-info { padding: 10px; }
        .product-info h4 { font-size: 14px; margin-bottom: 4px; }
        .product-info .desc { font-size: 11px; color: var(--text-muted); margin-bottom: 8px;
            display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .product-info .price { font-size: 16px; font-weight: 700; color: var(--success); }
        .product-info .btn-add {
            width: 100%; margin-top: 8px; padding: 8px;
            background: var(--primary); color: #fff; border: none;
            border-radius: 6px; font-weight: 600; font-size: 13px; cursor: pointer;
        }
        .product-info .btn-add:disabled { background: #555; cursor: not-allowed; }

        /* Cart */
        .cart-fab {
            position: fixed; bottom: 20px; right: 20px;
            width: 60px; height: 60px; border-radius: 50%;
            background: var(--primary); color: #fff; border: none;
            font-size: 24px; cursor: pointer; box-shadow: 0 4px 20px rgba(0,0,0,.4);
            z-index: 100; display: flex; align-items: center; justify-content: center;
        }
        .cart-fab .count {
            position: absolute; top: -4px; right: -4px;
            background: var(--danger); color: #fff;
            width: 22px; height: 22px; border-radius: 50%;
            font-size: 12px; font-weight: 700;
            display: flex; align-items: center; justify-content: center;
        }

        .cart-drawer {
            position: fixed; inset: 0; z-index: 200;
            background: rgba(0,0,0,.5); display: none;
        }
        .cart-drawer.open { display: flex; justify-content: flex-end; }
        .cart-panel {
            width: 90%; max-width: 400px; background: var(--dark-surface);
            display: flex; flex-direction: column; height: 100%;
        }
        .cart-header {
            padding: 16px; border-bottom: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center;
        }
        .cart-items { flex: 1; overflow-y: auto; padding: 12px; }
        .cart-item {
            display: flex; align-items: center; gap: 12px;
            padding: 10px; background: var(--dark-card); border-radius: 8px;
            margin-bottom: 8px;
        }
        .cart-item .emoji { font-size: 1.8rem; }
        .cart-item .details { flex: 1; }
        .cart-item .details h4 { font-size: 13px; }
        .cart-item .details .qty-price { font-size: 12px; color: var(--text-muted); }
        .cart-item .qty-controls { display: flex; align-items: center; gap: 6px; }
        .cart-item .qty-controls button {
            width: 28px; height: 28px; border-radius: 50%;
            border: 1px solid var(--border); background: transparent;
            color: var(--text); font-size: 14px; cursor: pointer;
        }
        .cart-item .remove-btn {
            background: none; border: none; color: var(--danger);
            cursor: pointer; font-size: 18px;
        }
        .cart-footer {
            padding: 16px; border-top: 1px solid var(--border);
        }
        .cart-footer .total { font-size: 18px; font-weight: 700; margin-bottom: 12px; }

        /* Order form */
        .order-form { padding: 16px; }
        .order-form .form-group { margin-bottom: 12px; }
        .order-form label { font-size: 12px; }
        .order-form .form-control { padding: 8px 12px; font-size: 13px; }

        .empty-state { text-align: center; padding: 40px 16px; color: var(--text-muted); }
    </style>
</head>
<body>
    <div id="storeBanner" class="store-banner"></div>
    <div id="statusBar" class="status-bar"></div>
    <div id="scheduleList" class="schedule-list hidden"></div>
    <div id="categoryBar" class="categories"></div>
    <div id="productGrid" class="products-grid"></div>

    <button class="cart-fab" onclick="toggleCart()">
        🛒 <span id="cartCount" class="count hidden">0</span>
    </button>

    <div id="cartDrawer" class="cart-drawer">
        <div class="cart-panel">
            <div class="cart-header">
                <h3>🛒 Carrinho</h3>
                <button class="btn btn-sm btn-outline" onclick="toggleCart()">✕ Fechar</button>
            </div>
            <div id="cartItems" class="cart-items"></div>
            <div class="cart-footer">
                <div class="total" id="cartTotal">Total: R$ 0,00</div>
                <div id="orderFormArea"></div>
                <button id="btnCheckout" class="btn btn-success w-full btn-lg" onclick="showOrderForm()">
                    Finalizar Pedido
                </button>
            </div>
        </div>
    </div>

    <script src="/js/api.js"></script>
    <script>
        let store = null;
        let storeStatus = null;
        let categories = [];
        let products = [];
        let cart = [];
        let selectedCategory = null;
        let scheduleVisible = false;

        async function init() {
            const id = getEstabelecimentoId();
            const [storeRes, statusRes, catRes, prodRes] = await Promise.all([
                apiGet(`/api/estabelecimentos/${id}`),
                apiGet(`/api/estabelecimentos/${id}/status`),
                apiGet(`/api/categorias/estabelecimento/${id}`),
                apiGet(`/api/produtos/estabelecimento/${id}`)
            ]);

            store = storeRes.dados;
            storeStatus = statusRes.dados;
            categories = catRes.dados || [];
            products = prodRes.dados || [];

            if (!store) {
                document.body.innerHTML = '<div class="empty-state"><h2>Estabelecimento não encontrado</h2><a href="/">Voltar</a></div>';
                return;
            }

            renderBanner();
            renderStatus();
            renderCategories();
            renderProducts();
        }

        function renderBanner() {
            document.title = store.nome + ' - Cardápio Digital';
            document.getElementById('storeBanner').innerHTML = `
                <h2>${store.nome}</h2>
                <p style="color:var(--text-muted); font-size:13px">${store.tipoDescricao} • ${store.cidade}</p>
            `;
        }

        function renderStatus() {
            const bar = document.getElementById('statusBar');
            const s = storeStatus;
            const cls = s.status === 'Aberto' ? 'open' : s.status === 'Pausado' ? 'paused' : 'closed';
            bar.className = `status-bar ${cls}`;
            bar.innerHTML = `
                <div>${s.status === 'Aberto' ? '🟢' : s.status === 'Pausado' ? '🟡' : '🔴'} ${s.status} — ${s.mensagem}</div>
                ${s.proximaAbertura ? `<span class="next-opening">⏰ Próxima abertura: ${s.proximaAbertura}</span>` : ''}
                <button class="schedule-toggle" onclick="toggleSchedule()">Ver horários</button>
            `;
            // Render schedule
            const list = document.getElementById('scheduleList');
            list.innerHTML = s.horarios.map(h =>
                `<div><span>${h.diaNome}</span><span>${h.fechado ? 'Fechado' : h.horaAbertura + ' - ' + h.horaFechamento}</span></div>`
            ).join('');
        }

        function toggleSchedule() {
            scheduleVisible = !scheduleVisible;
            document.getElementById('scheduleList').classList.toggle('hidden', !scheduleVisible);
        }

        function renderCategories() {
            const bar = document.getElementById('categoryBar');
            const allBtn = `<button class="cat-btn ${!selectedCategory ? 'active' : ''}" onclick="filterCategory(null)">Todos</button>`;
            const catBtns = categories.map(c =>
                `<button class="cat-btn ${selectedCategory === c.id ? 'active' : ''}" onclick="filterCategory(${c.id})">${c.icone || ''} ${c.nome}</button>`
            ).join('');
            bar.innerHTML = allBtn + catBtns;
        }

        function filterCategory(catId) {
            selectedCategory = catId;
            renderCategories();
            renderProducts();
        }

        function renderProducts() {
            const grid = document.getElementById('productGrid');
            let filtered = products.filter(p => p.ativo);

            if (!store.exibeProdutoSemEstoque) {
                filtered = filtered.filter(p => p.temEstoque);
            }
            if (selectedCategory) {
                filtered = filtered.filter(p => p.categoriaId === selectedCategory);
            }

            if (filtered.length === 0) {
                grid.innerHTML = '<div class="empty-state">Nenhum produto encontrado nesta categoria.</div>';
                return;
            }

            const isOpen = storeStatus.status === 'Aberto';
            const canAdd = isOpen || store.permiteCarrinhoFechado;

            grid.innerHTML = filtered.map(p => {
                let badge = '';
                let btnText = 'Adicionar';
                let btnDisabled = false;

                if (!p.temEstoque) {
                    badge = '<div class="product-badge" style="background:var(--danger);color:#fff">Sem Estoque</div>';
                    btnText = 'Indisponível';
                    btnDisabled = true;
                } else if (!isOpen && !canAdd) {
                    badge = '<div class="product-badge" style="background:var(--warning);color:#fff">Loja Fechada</div>';
                    btnText = 'Indisponível';
                    btnDisabled = true;
                }

                return `
                    <div class="product-card">
                        <div class="product-img">
                            ${p.imagemUrl ? `<img src="${p.imagemUrl}" style="width:100%;height:100%;object-fit:cover">` : '📦'}
                            ${badge}
                        </div>
                        <div class="product-info">
                            <h4>${p.nome}</h4>
                            <div class="desc">${p.descricao}</div>
                            <div class="price">${formatCurrency(p.preco)}</div>
                            <button class="btn-add" ${btnDisabled ? 'disabled' : ''} onclick="addToCart(${p.id})">${btnText}</button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function addToCart(productId) {
            const p = products.find(x => x.id === productId);
            if (!p) return;
            const existing = cart.find(x => x.product.id === productId);
            if (existing) { existing.qty++; }
            else { cart.push({ product: p, qty: 1 }); }
            updateCartUI();
            toast(`${p.nome} adicionado ao carrinho!`);
        }

        function removeFromCart(productId) {
            cart = cart.filter(x => x.product.id !== productId);
            updateCartUI();
        }

        function changeQty(productId, delta) {
            const item = cart.find(x => x.product.id === productId);
            if (!item) return;
            item.qty += delta;
            if (item.qty <= 0) cart = cart.filter(x => x.product.id !== productId);
            updateCartUI();
        }

        function updateCartUI() {
            const count = cart.reduce((s, i) => s + i.qty, 0);
            const total = cart.reduce((s, i) => s + (i.product.preco * i.qty), 0);
            const countEl = document.getElementById('cartCount');
            countEl.textContent = count;
            countEl.classList.toggle('hidden', count === 0);
            document.getElementById('cartTotal').textContent = `Total: ${formatCurrency(total)}`;

            const itemsEl = document.getElementById('cartItems');
            if (cart.length === 0) {
                itemsEl.innerHTML = '<div class="empty-state">Carrinho vazio</div>';
            } else {
                itemsEl.innerHTML = cart.map(i => `
                    <div class="cart-item">
                        <span class="emoji">📦</span>
                        <div class="details">
                            <h4>${i.product.nome}</h4>
                            <span class="qty-price">${i.qty}x ${formatCurrency(i.product.preco)} = ${formatCurrency(i.product.preco * i.qty)}</span>
                        </div>
                        <div class="qty-controls">
                            <button onclick="changeQty(${i.product.id}, -1)">−</button>
                            <span>${i.qty}</span>
                            <button onclick="changeQty(${i.product.id}, 1)">+</button>
                        </div>
                        <button class="remove-btn" onclick="removeFromCart(${i.product.id})">✕</button>
                    </div>
                `).join('');
            }

            // Update checkout button
            const btn = document.getElementById('btnCheckout');
            const isOpen = storeStatus.status === 'Aberto';
            if (isOpen || store.permitePedidoForaHorario) {
                btn.textContent = 'Finalizar Pedido';
                btn.className = 'btn btn-success w-full btn-lg';
                btn.disabled = cart.length === 0;
            } else if (store.permiteAgendamento) {
                btn.textContent = 'Agendar Pedido';
                btn.className = 'btn btn-warning w-full btn-lg';
                btn.disabled = cart.length === 0;
            } else {
                btn.textContent = 'Loja Fechada';
                btn.className = 'btn btn-outline w-full btn-lg';
                btn.disabled = true;
            }
        }

        function toggleCart() {
            document.getElementById('cartDrawer').classList.toggle('open');
        }

        function showOrderForm() {
            if (cart.length === 0) return;
            const isSchedule = storeStatus.status !== 'Aberto' && !store.permitePedidoForaHorario && store.permiteAgendamento;
            const area = document.getElementById('orderFormArea');
            area.innerHTML = `
                <div class="order-form">
                    <div class="form-group">
                        <label>Seu nome *</label>
                        <input class="form-control" id="fNome" placeholder="Nome completo">
                    </div>
                    <div class="form-group">
                        <label>Telefone *</label>
                        <input class="form-control" id="fTel" placeholder="(00) 00000-0000">
                    </div>
                    <div class="form-group">
                        <label>Tipo do pedido</label>
                        <select class="form-control" id="fTipo" onchange="toggleDeliveryField()">
                            ${store.aceitaDelivery ? '<option value="1">🛵 Delivery</option>' : ''}
                            ${store.aceitaRetirada ? '<option value="2">🏃 Retirada</option>' : ''}
                            ${store.aceitaBalcao ? '<option value="3">🏪 Balcão</option>' : ''}
                            ${store.aceitaMesa ? '<option value="4">🍽️ Mesa</option>' : ''}
                        </select>
                    </div>
                    <div class="form-group" id="fEnderecoGroup" style="display:none">
                        <label>Endereço de entrega</label>
                        <input class="form-control" id="fEndereco" placeholder="Rua, número, bairro">
                    </div>
                    <div class="form-group">
                        <label>Pagamento</label>
                        <select class="form-control" id="fPag">
                            <option value="1">💵 Dinheiro</option>
                            <option value="2">💳 Crédito</option>
                            <option value="3">💳 Débito</option>
                            <option value="4">📱 Pix</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Observações</label>
                        <input class="form-control" id="fObs" placeholder="Alguma observação?">
                    </div>
                    ${isSchedule ? `
                    <div class="form-group">
                        <label>Agendar para</label>
                        <input type="datetime-local" class="form-control" id="fAgenda">
                    </div>` : ''}
                    <button class="btn btn-success w-full" onclick="submitOrder()">Confirmar Pedido</button>
                </div>
            `;
            toggleDeliveryField();
            document.getElementById('btnCheckout').classList.add('hidden');
        }

        function toggleDeliveryField() {
            const tipo = document.getElementById('fTipo')?.value;
            const group = document.getElementById('fEnderecoGroup');
            if (group) group.style.display = tipo === '1' ? 'block' : 'none';
        }

        async function submitOrder() {
            const nome = document.getElementById('fNome').value.trim();
            const tel = document.getElementById('fTel').value.trim();
            if (!nome || !tel) { toast('Preencha nome e telefone!', 'error'); return; }

            const dto = {
                estabelecimentoId: parseInt(getEstabelecimentoId()),
                clienteId: null,
                nomeCliente: nome,
                telefoneCliente: tel,
                tipo: parseInt(document.getElementById('fTipo').value),
                formaPagamento: parseInt(document.getElementById('fPag').value),
                mesaId: null,
                enderecoEntrega: document.getElementById('fEndereco')?.value || null,
                observacoes: document.getElementById('fObs').value || null,
                agendadoPara: document.getElementById('fAgenda')?.value || null,
                itens: cart.map(i => ({ produtoId: i.product.id, quantidade: i.qty, observacao: null }))
            };

            const res = await apiPost('/api/pedidos', dto);
            if (res.sucesso) {
                cart = [];
                updateCartUI();
                document.getElementById('orderFormArea').innerHTML = '';
                document.getElementById('btnCheckout').classList.remove('hidden');
                toggleCart();
                toast(`Pedido ${res.dados.codigo} criado com sucesso! 🎉`);
                // Refresh products to update stock
                const prodRes = await apiGet(`/api/produtos/estabelecimento/${getEstabelecimentoId()}`);
                products = prodRes.dados || [];
                renderProducts();
            } else {
                toast(res.mensagem, 'error');
            }
        }

        init();
    </script>
</body>
</html>
